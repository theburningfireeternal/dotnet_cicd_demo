name: Product API CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test:

    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore

      - run: dotnet build --no-restore -c Release

      - run: dotnet test --no-build -c Release /p:CollectCoverage=true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=theburningfireeternal_dotnet_cicd_demo
            -Dsonar.organization=theburningfireeternal
            -Dsonar.host.url=https://sonarcloud.io

  docker:

    needs: build-test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t product-api:latest -f ProductCatalog.Api/Dockerfile .

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag image
        run: docker tag product-api:latest ghcr.io/${{ github.repository }}/product-api:latest
        
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}/product-api:latest

  deploy:

    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: AzureCloudDemo
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ghcr.io/${{ github.repository }}/product-api:latest